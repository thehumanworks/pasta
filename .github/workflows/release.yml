name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate tag
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "expected semantic tag like v0.1.1, got $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run portable checks
        run: |
          bun run types
          bun test test/bun/cli.test.ts test/bun/crypto.test.ts test/bun/hardening.test.ts
          bun run test:worker
          bunx tsc --noEmit

      - name: Build release assets
        env:
          PASTA_RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: bun run build:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pasta-${{ env.RELEASE_TAG }}-release-assets
          path: dist/release/*
          if-no-files-found: error

      - name: Publish GitHub release
        run: |
          assets=(dist/release/pasta-* dist/release/checksums.txt)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes-file dist/release/RELEASE_NOTES.md
          fi
