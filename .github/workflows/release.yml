name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' }}
      ARTIFACT_SUFFIX: ${{ github.ref_type == 'branch' && github.ref_name == 'main' && 'latest' || (github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}
    steps:
      - name: Validate release context
        run: |
          if [ "$PUBLISH_RELEASE" = "true" ]; then
            case "$RELEASE_REF" in
              v[0-9]*.[0-9]*.[0-9]*) ;;
              *) echo "expected semantic tag like v0.1.1, got $RELEASE_REF" >&2; exit 1 ;;
            esac
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run portable checks
        run: |
          bun run check:no-latest
          bun run types
          bun test test/bun/cli.test.ts test/bun/crypto.test.ts test/bun/hardening.test.ts
          bun run test:worker
          bunx tsc --noEmit

      - name: Build release assets
        env:
          PASTA_RELEASE_VERSION: ${{ env.PUBLISH_RELEASE == 'true' && env.RELEASE_REF || '' }}
        run: bun run build:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pasta-${{ env.ARTIFACT_SUFFIX }}-release-assets
          path: dist/release/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: env.PUBLISH_RELEASE == 'true'
        run: |
          assets=(dist/release/pasta-* dist/release/checksums.txt)
          if gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            gh release upload "$RELEASE_REF" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_REF" "${assets[@]}" \
              --verify-tag \
              --title "$RELEASE_REF" \
              --notes-file dist/release/RELEASE_NOTES.md
          fi


  ios-checks:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run Swift package tests
        run: swift test --package-path ios

      - name: Run keyboard performance gate
        run: swift ios/Benchmarks/KeyboardHotPathBenchmark.swift --iterations 10000 --mode both --max-optimized-total-ms 600 --min-improvement-percent 50
