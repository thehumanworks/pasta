name: Pasta
options:
  bundleIdPrefix: com.thehumanworks
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  PastaCore:
    path: .
targets:
  Pasta:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    resources:
      - path: App/Resources
    dependencies:
      - package: PastaCore
        product: PastaCore
      - target: PastaKeyboard
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thehumanworks.pasta
        PRODUCT_NAME: Pasta
        DISPLAY_NAME: Pasta
        MARKETING_VERSION: 0.1.7
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: 6.0
        DEVELOPMENT_TEAM: 54MXM5JG3R
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/Pasta.entitlements
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
  PastaKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Keyboard
    dependencies:
      - package: PastaCore
        product: PastaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thehumanworks.pasta.keyboard
        PRODUCT_NAME: PastaKeyboard
        DISPLAY_NAME: Pasta Keyboard
        MARKETING_VERSION: 0.1.7
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: 6.0
        DEVELOPMENT_TEAM: 54MXM5JG3R
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Keyboard/PastaKeyboard.entitlements
        INFOPLIST_FILE: Keyboard/Info.plist
        GENERATE_INFOPLIST_FILE: NO
schemes:
  Pasta:
    build:
      targets:
        Pasta: all
        PastaKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
